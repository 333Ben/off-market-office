<svg xmlns="http://www.w3.org/2000/svg" width="560" height="160" viewBox="0 0 560 160">
  <!-- OMO — Off Market Office : arc de match entre demande (violet) et offre (corail) -->
  <defs>
    <linearGradient id="arc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C5CFC"/>
      <stop offset="100%" stop-color="#FF6B5E"/>
    </linearGradient>
  </defs>

  <!-- Mark -->
  <g transform="translate(20,30)">
    <path d="M 14 74 Q 60 6 106 74" fill="none" stroke="url(#arc)" stroke-width="9" stroke-linecap="round"/>
    <circle cx="14" cy="74" r="13" fill="#7C5CFC"/>
    <circle cx="14" cy="74" r="13" fill="none" stroke="#FFFFFF" stroke-width="3"/>
    <circle cx="106" cy="74" r="13" fill="#FF6B5E"/>
    <circle cx="106" cy="74" r="13" fill="none" stroke="#FFFFFF" stroke-width="3"/>
  </g>

  <!-- Wordmark -->
  <text x="160" y="98" font-family="Inter, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="72" font-weight="700" letter-spacing="2" fill="#17171F">OMO</text>
  <text x="164" y="128" font-family="Inter, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="19" font-weight="500" letter-spacing="5" fill="#6B7280">OFF MARKET OFFICE</text>
</svg>
